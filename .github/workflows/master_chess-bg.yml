
name: AWS Pipeline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  TF_DIR: terraform_aws
  NETCORE_VERSION: '6.0.300'
  # PIPELINE_NAME: 'chess-app-pipeline'
  AWS_PLATFORM: '.NET Core on Linux'

jobs:
  terraform:
    runs-on: ubuntu-latest
    name: 'Terraform'
    outputs:
      # app_name: ${{ steps.apply.outputs.app_name }}
      # env_app: ${{ steps.apply.outputs.env_app }}
      aws_region: ${{ steps.apply.outputs.aws_region }}

    steps:
    - uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1
      with:
        cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
        terraform_wrapper: false
      
    - name: Terraform Init
      id: init
      run: terraform init
      working-directory: ${{ env.TF_DIR }}

    - name: Terraform Validate
      id: validate
      run: terraform validate -no-color
      working-directory: ${{ env.TF_DIR }}

    - name: Terraform Plan
      id: plan
      if: github.event_name == 'pull_request'
      run: terraform plan -no-color -input=false
      working-directory: ${{ env.TF_DIR }}
      continue-on-error: true

    - name: Update Pull Request
      uses: actions/github-script@v6
      if: github.event_name == 'pull_request'
      env:
        PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
          #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
          #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`
          #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`

          <details><summary>Show Plan</summary>

          \`\`\`\n
          ${process.env.PLAN}
          \`\`\`

          </details>

          *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })

    - name: Terraform Plan Status
      if: steps.plan.outcome == 'failure'
      run: exit 1

    - name: Terraform Apply
      id: apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        terraform apply -input=false -auto-approve -var="sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}" -var="SSH_PUBLIC_KEY=${{ secrets.SSH_PUBLIC_KEY }}"
        #echo "::set-output name=app_name::$(terraform output app-name)"
        #echo "::set-output name=env_app::$(terraform output env-app)"
        echo "::set-output name=aws_region::$(terraform output aws-region)"
      working-directory: ${{ env.TF_DIR }}

  # trigger:
  #   name: "Trigger CodePipeline"
  #   needs: terraform
  #   runs-on: ubuntu-latest
  #   steps:
  #   - name: Trigger AWS CodePipeline
  #     uses: zulhfreelancer/aws-codepipeline-action@v1.0.7
  #     with:
  #       aws-region: ${{ needs.terraform.outputs.aws_region }}
  #       aws-access-key: ${{ secrets.AWS_ACCESS_KEY_ID }}
  #       aws-secret-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  #       pipeline-name: ${{ env.PIPELINE_NAME }}

  build:
    runs-on: ubuntu-latest
    name: Build

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET Core SDK ${{ env.NETCORE_VERSION }}
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: ${{ env.NETCORE_VERSION }}

    - name: Restore
      run: dotnet restore
      working-directory: src

    - name: Build
      run: dotnet build --no-restore -c Release
      working-directory: src

    - name: Publish
      run: dotnet publish --no-restore --no-build -c Release -o ${{ env.DOTNET_ROOT }}/myapp
      working-directory: src

    - name: Upload artifact for deployment job
      uses: actions/upload-artifact@v2
      with:
        name: .net-app
        path: ${{ env.DOTNET_ROOT }}/myapp

    - name: Configure AWS Creds
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ needs.terraform.outputs.aws_region }}
    - run: |
        AWS_VERSION_LABEL=${{ needs.terraform.outputs.app_name }}-${{ github.run_number }}

        echo "Uploading Source bundle to S3"
        S3_KEY="$AWS_VERSION_LABEL.zip"
        aws s3 cp .net-app.zip s3://${{ env.S3_BUCKET }}/${S3_KEY} --region ${{ needs.terraform.outputs.aws_region}}

        echo "Creating Elastic Beanstalk version"
        aws elasticbeanstalk create-application-version --application-name ${{ needs.terraform.outputs.app_name }} --version-label $AWS_VERSION_LABEL --region ${{ needs.terraform.outputs.aws_region }} --source-bundle S3Bucket=${{ env.S3_BUCKET }},S3Key=${S3_KEY} --auto-create-application

  deploy:
    runs-on: ubuntu-latest
    needs: [build, terraform]
  #   environment:
  #     name: 'Production'
  #     # APPLICATION_NAME: ${{ jobs.terraform.outputs.app_name }}
  #     # ENVIRONMENT_NAME: ${{ jobs.terraform.outputs.env_app }}
  #     # AWS_REGION: ${{ jobs.terraform.outputs.aws_region }}
  #     url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    - name: Set up python 3.6 (needs for eb cli)
      uses: actions/setup-python@v1
      with:
        python-version: "3.6"

    - name: Configure AWS Creds
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ needs.jobs.outputs.aws_region }}
    
    - run: |
        AWS_VERSION_LABEL=${{ needs.jobs.outputs.app_name }}-${{ github.run_number }}

        echo "Installing Elastic Beanstalk Cli"
        python -m pip install --upgrade pip
        pip install awsebcli --upgrade
        eb --version

        echo "Deploy init"
        eb init -i ${{ needs.terraform.outputs.app_name }} -p ${{ env.AWS_PLATFORM }} -k ${{ secrets.SSH_PUBLIC_KEY }} --region ${{ needs.terraform.outputs.aws_region }}
        eb deploy ${{ needs.terraform.outputs.app_name }} --version ${AWS_VERSION_LABEL}
        echo "Deploy finished"